<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!--
      Responsive scaling system — adapte la taille des éléments à la largeur de l'écran.
      Beaucoup d'éléments de Yuno sont dimensionnés en pixels fixes, calés sur un téléphone
      "baseline" (~390px de large). Sur un grand téléphone (iPhone 14 Pro Max = 430px), ces
      tailles fixes ne grandissent pas → tout paraît trop petit avec beaucoup de vide.
      Ce script demande au navigateur de mettre en page à la largeur "baseline" puis de mettre
      à l'échelle pour remplir l'écran : le navigateur agrandit TOUT uniformément (px + rem +
      images + canvas Mapbox), sans débordement horizontal. Les petits téléphones et le desktop
      ne sont pas touchés. Un seul réglage à tuner : BASELINE (plus petit = plus gros).

      EXCEPTION — l'app « Yuno Pro » (User-Agent 'YunoPro', cf. pro/capacitor.config.ts) est
      EXCLUE de ce zoom. Le B2C est une vitrine : grossir est un plus. Les surfaces staff
      (commandes VIP, tickets barman, liste videur) sont des outils OPÉRATIONNELS : ce qui
      compte est le nombre de lignes visibles d'un coup, pas la taille du texte. Zoomer à
      1,10-1,20× rendait un iPhone 430px équivalent à un 390px — ~10 % de largeur utile
      perdue, d'où les noms qui passaient à la ligne et les prix qui percutaient les badges.
      En Pro on garde donc la vraie largeur de l'appareil (width=device-width).
    -->
    <script>
      (function () {
        var BASELINE = 390;     // largeur de référence en px (densité cible). Plus bas = éléments plus gros.
        var MAX_SCALE = 1.20;   // agrandissement maximum (évite que les très grands écrans explosent).
        var PHONE_MAX = 480;    // au-delà, c'est une tablette : on ne touche pas.
        var vp = document.querySelector('meta[name="viewport"]');
        var DEFAULT = 'width=device-width, initial-scale=1, viewport-fit=cover';
        // L'UA est posé par le WebView AVANT le chargement du document : lisible dès ici.
        var IS_PRO = navigator.userAgent.indexOf('YunoPro') !== -1;
        function apply() {
          try {
            var portrait = !window.matchMedia || window.matchMedia('(orientation: portrait)').matches;
            // Dimensions de l'appareil en px CSS, indépendantes du viewport courant.
            var narrow = Math.min(screen.width, screen.height);
            var wide = Math.max(screen.width, screen.height);
            var deviceWidth = portrait ? narrow : wide;
            if (!IS_PRO && portrait && deviceWidth > BASELINE && deviceWidth <= PHONE_MAX) {
              var scale = Math.min(deviceWidth / BASELINE, MAX_SCALE);
              var target = Math.round(deviceWidth / scale);
              vp.setAttribute('content', 'width=' + target + ', viewport-fit=cover');
              // Zoom réellement appliqué (1 px CSS = __yunoViewportScale pt écran).
              // Lu par le loader natif ci-dessous et SplashScreen.tsx pour que le
              // logo garde la taille EXACTE du Launch Screen natif (en pt écran),
              // sinon le raccord launch → splash saute visuellement (~10 %).
              window.__yunoViewportScale = deviceWidth / target;
            } else {
              vp.setAttribute('content', DEFAULT);
              window.__yunoViewportScale = 1;
            }
          } catch (e) {
            vp.setAttribute('content', DEFAULT);
            window.__yunoViewportScale = 1;
          }
        }
        apply();
        window.addEventListener('orientationchange', apply);
        window.addEventListener('resize', apply);
      })();
    </script>

  <!-- Structured data (JSON-LD) — Organization + WebSite. Statique, servi sur toutes les
       routes (SPA fallback). Le Worker crawler ajoute par-dessus le schema par entité
       (Event / NightClub / MusicGroup) sur /event, /club, /dj, /o. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://yunoapp.eu/#organization",
        "name": "Yuno",
        "alternateName": "Yuno App",
        "url": "https://yunoapp.eu/",
        "logo": "https://yunoapp.eu/apple-touch-icon.png",
        "image": "https://yunoapp.eu/social-card.webp?v=2",
        "email": "contact@yunoapp.eu",
        "description": "Yuno is your whole night out in one app: buy event tickets, book VIP bottle-service tables, and order drinks to skip the bar queue."
      },
      {
        "@type": "WebSite",
        "@id": "https://yunoapp.eu/#website",
        "name": "Yuno",
        "alternateName": "Yuno App",
        "url": "https://yunoapp.eu/",
        "inLanguage": "en",
        "publisher": { "@id": "https://yunoapp.eu/#organization" }
      }
    ]
  }
  </script>

  <body>
    <div id="root">
      <!-- Inline loading skeleton for faster FCP -->
      <div id="initial-loader" style="min-height:100vh;background:#050505;display:flex;align-items:center;justify-content:center">
        <div id="initial-spinner" style="width:32px;height:32px;border:3px solid #1a1a1a;border-top-color:#c62828;border-radius:50%;animation:spin 1s linear infinite"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script>
      // App native B2C : dès le tout premier pixel, on affiche EXACTEMENT la même
      // image que le Launch Screen natif (rouge + logo terminé, coupe vide) pour
      // que le logo ne « clignote » pas entre le launch screen, ce loader et le
      // splash animé (SplashScreen.tsx) qui prend le relais. Le web classique et
      // l'app Pro staff (UA « YunoPro ») gardent le fond sombre + spinner.
      (function () {
        try {
          if (location.protocol === 'capacitor:' && navigator.userAgent.indexOf('YunoPro') === -1) {
            var l = document.getElementById('initial-loader');
            if (l) {
              // Compense le zoom viewport (script <head>) : le logo doit faire la
              // même taille en pt ÉCRAN que le Launch Screen natif (storyboard),
              // pas en px CSS agrandis. Sans ça, sur les grands iPhone le logo
              // web est ~10 % plus grand que le statique → switch visible.
              var z = window.__yunoViewportScale || 1;
              l.style.background = '#E51D2A';
              l.innerHTML =
                '<div style="position:relative;display:flex;flex-direction:column;align-items:center;transform:scale(' + (1 / z) + ');">' +
                '<svg width="212" height="265" viewBox="0 0 220 275" fill="none" style="overflow:visible;">' +
                '<path d="M 34 26 L 186 26 L 110 150 Z" stroke="#fff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>' +
                '<path d="M 110 150 L 110 216" stroke="#fff" stroke-width="15" stroke-linecap="round" fill="none"></path>' +
                '<path d="M 72 216 L 148 216" stroke="#fff" stroke-width="15" stroke-linecap="round" fill="none"></path>' +
                '</svg>' +
                '<div style="margin-top:-30px;font-size:106px;font-weight:500;letter-spacing:-1px;color:#fff;line-height:1;font-family:\'Poppins\',ui-sans-serif,system-ui,sans-serif;">yuno</div>' +
                '</div>';
            }
          }
        } catch (e) { /* no-op */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
