# ── Réconciliation complète : fonctions DÉPLOYÉES (vérifié `supabase functions
# list`) qui n'avaient pas d'entrée ici. Sans déclaration, un redéploiement les
# remet au défaut gateway verify_jwt = true. CRITIQUE pour l'onboarding : les
# accept-*-invitation sont des liens publics (le partenaire n'a pas encore de
# session) → DOIVENT être false, sinon le lien d'invitation renvoie 401.
# Convention : accept-* / liens publics / reset PIN / tracking = false ;
# invite-* (admin authentifié) / actions sensibles = true.

