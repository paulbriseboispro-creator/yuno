# ── Réconciliation : fonctions DÉPLOYÉES en prod (vérifié via `supabase functions
# list`) mais qui manquaient dans ce fichier. Sans entrée ici, un redéploiement les
# remet au défaut gateway verify_jwt = true, ce qui bloque les appels guest (checkout
# VIP invité) et serveur-à-serveur (verify-ticket-payment → send-ticket-confirmation,
# d'où "le client paie et ne reçoit pas son billet"). On aligne sur les fonctions
# sœurs, toutes en verify_jwt = false (elles font leur propre authentification).
